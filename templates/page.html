<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} – Spiritfarer Wiki</title>
  <link rel="stylesheet" href="https://spiritfarer.fandom.com/wikia.php?controller=ThemeApi&method=themeVariables">
  <link rel="stylesheet" href="https://spiritfarer.fandom.com/load.php?lang=en&modules=ext.fandom.ArticleInterlang.css%7Cext.fandom.CreatePage.css%7Cext.fandom.Experiments.TRFC147%7Cext.fandom.GlobalComponents.CommunityHeader.css%7Cext.fandom.GlobalComponents.CommunityHeaderBackground.css%7Cext.fandom.GlobalComponents.CommunityNavigation.css%7Cext.fandom.GlobalComponents.GlobalComponentsTheme.light.css%7Cext.fandom.GlobalComponents.GlobalExploreNavigation.css%7Cext.fandom.GlobalComponents.GlobalFooter.css%7Cext.fandom.GlobalComponents.GlobalNavigationTheme.light.css%7Cext.fandom.GlobalComponents.GlobalTopNavigation.css%7Cext.fandom.GlobalComponents.StickyNavigation.css%7Cext.fandom.HighlightToAction.css%7Cext.fandom.PortableInfoboxFandomDesktop.css%7Cext.fandom.SuggestedPages.css%7Cext.fandom.Thumbnails.css%7Cext.fandom.ThumbnailsViewImage.css%7Cext.fandom.Uncrawlable.css%7Cext.fandom.ae.odyssey.desktop.css%7Cext.fandom.bannerNotifications.desktop.css%7Cext.fandomVideo.css%7Cext.staffSig.css%7Cext.visualEditor.desktopArticleTarget.noscript%7Cskin.fandomdesktop.CargoTables-ext.css%7Cskin.fandomdesktop.Math.css%7Cskin.fandomdesktop.rail.css%7Cskin.fandomdesktop.styles%7Cvendor.tippy.css&only=styles&skin=fandomdesktop">
  <link rel="stylesheet" href="https://spiritfarer.fandom.com/load.php?lang=en&modules=site.styles&only=styles&skin=fandomdesktop">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
    .back { margin-bottom: 16px; display: inline-block; }
    .categories { margin: 8px 0 16px; font-size: 13px; }
    .categories span { padding: 2px 8px; border-radius: 4px; margin-right: 4px; border: 1px solid currentColor; opacity: 0.7; }
    .wiki-content img { max-width: 100%; height: auto; }
    .wiki-content .mw-empty-elt { display: none; }
  </style>
</head>
<body class="skin-fandomdesktop theme-fandomdesktop-light" data-theme="light">
  <a class="back" href="/">← Back to index</a>
  <h1>{{ page.title }}</h1>
  {% if categories %}
  <div class="categories">
    {% for c in categories %}<span>{{ c.replace('_', ' ') }}</span>{% endfor %}
  </div>
  {% endif %}
  <div class="wiki-content">{{ page.html | safe }}</div>
</body>
</html>
