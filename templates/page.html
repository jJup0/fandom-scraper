<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} – Spiritfarer Wiki</title>
  <link rel="stylesheet" href="/static/fandom-all.css">
  <style>
    html { min-height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; min-height: 100%;
      background: var(--theme-body-background-color) url('/static/images/site-background.png') top center no-repeat;
      background-size: cover; background-attachment: fixed;
      color: var(--theme-body-text-color); }
    .page-wrapper { max-width: 900px; margin: 0 auto; background: var(--theme-page-background-color); color: var(--theme-page-text-color); padding: 24px; border-radius: 8px; }
    .page-wrapper a { color: var(--theme-link-color); }
    .back { margin-bottom: 16px; display: inline-block; }
    .categories { margin: 8px 0 16px; font-size: 13px; }
    .categories span { padding: 2px 8px; border-radius: 4px; margin-right: 4px; border: 1px solid var(--theme-border-color); }
    .wiki-content img { max-width: 100%; height: auto; }
    .wiki-content .mw-empty-elt { display: none; }
    /* Fandom JS normally sets these dynamically */
    .pi-secondary-background { background: var(--theme-accent-color); color: var(--theme-accent-label-color); }
    .pi-border-color { border-color: var(--theme-border-color); }
    .pi-background { background: var(--theme-page-background-color); }
    .portable-infobox { float: right; width: 270px; margin: 0 0 16px 16px; border: 1px solid var(--theme-border-color); }
    .pi-data-label { font-weight: bold; }
    .article-table th { background: var(--theme-page-background-color--secondary); }
  </style>
</head>
<body class="skin-fandomdesktop theme-fandomdesktop-light" data-theme="light">
  <a class="back" href="/">← Back to index</a>
  <div class="page-wrapper">
  <h1>{{ page.title }}</h1>
  {% if categories %}
  <div class="categories">
    {% for c in categories %}<span>{{ c.replace('_', ' ') }}</span>{% endfor %}
  </div>
  {% endif %}
  <div class="wiki-content">{{ page.html | safe }}</div>
  </div>
</body>
</html>
